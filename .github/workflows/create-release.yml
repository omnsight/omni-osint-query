name: Tag and Release

on:
  push:
    branches:
      - main
    paths:
      - 'pyproject.toml'

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create tags and releases
      actions: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all tags for version comparison

      - name: Get Version from pyproject.toml
        id: get_version
        run: |
          # Extracts the version line, removes "version =", quotes, and spaces
          VERSION=$(grep '^version =' pyproject.toml | cut -d '"' -f 2 | cut -d "'" -f 2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Version: $VERSION"

      - name: Check if Tag Exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.get_version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get_version.outputs.VERSION }} already exists. Skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Git Tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.get_version.outputs.VERSION }}" -m "Release v${{ steps.get_version.outputs.VERSION }}"
          git push origin "v${{ steps.get_version.outputs.VERSION }}"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          generate_release_notes: true # Automatically generates "What's Changed"

      - name: Trigger Release Workflow
        run: |
          gh workflow run docker-publish.yml --ref "v${{ steps.get_version.outputs.VERSION }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
